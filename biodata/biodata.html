<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Pemintan - JS DOM</title>
    <link rel="stylesheet" href="./style2.css">
  </head>
  <body>
    <center>
      <div class="container">
        <div class="header">
          <h3>Pendaftaran Peminatan</h3>
        </div>

        <form action="">

          <label for="namaMhs">Nama</label><br />
          <input
            type="text"
            placeholder="Nama anda"
            id="namaMhs"
          /><br /><br />

          <label for="nimMhs">NIM</label><br />
          <input
            type="text"
            placeholder="NIM anda"
            id="nimMhs"
          /><br /><br />

          <label for="tahunMsk">Angkatan</label><br />
          <select name="tahunMsk" id="tahunMsk">
            <option value="">-- Pilih Angkatan --</option>
            <option value="2023">Angkatan 2023</option>
            <option value="2024">Angkatan 2024</option>
            <option value="2025">Angkatan 2025</option>            
            </select><br /><br />

          <p>Peminatan pada bidang:</p>
          <input type="radio" name="peminatan" id="programming" value="Programming" />
          <label for="programming">Programming</label> <br />

          <input type="radio" name="peminatan" id="desain" value="Desain" />
          <label for="desain">Desain</label><br />

          <input type="radio" name="peminatan" id="jaringan" value="Jaringan" />
          <label for="jaringan">Jaringan</label><br />
        
          <input type="radio" name="peminatan" id="data" value="Data" />
          <label for="data">Data</label><br /><br />

          <!-- input tanggal -->
          <label for="tanggalLahir">Tanggal</label><br />
          <input type="date" id="tanggalLahir" /><br /><br />

          <!-- textarea utk alamat -->
          <label for="alamat">Alamat</label><br />
          <textarea
            placeholder="Tulis alamatmu di sini"
            name="alamat"
            id="alamat"
            cols="30"
            rows="5"
          ></textarea
          ><br /><br />

          <button type="submit" onclick="kirimData()">Submit</button>
        </form>
      </div>
    </center>

    </center>

        <div class="home-nav">
            <a href="../index.html" class="btn-home">Home</a>
        </div>

        <script src="script2.js"></script>
      </body>

    <script src="script2.js"></script>
  </body>
</html>
